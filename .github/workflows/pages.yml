name: Deploy Arcaea Webapp

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Rebuild release archive
        run: |
          cat arcaea-webapp.tar.gz.part-* > arcaea-webapp.tar.gz
          mkdir site
          tar -xzf arcaea-webapp.tar.gz -C site
          if [ -d site/Arcaea.webapp ]; then
            shopt -s dotglob
            mkdir publish
            mv site/Arcaea.webapp/* publish/
          else
            echo "Arcaea.webapp folder not found after extraction"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
